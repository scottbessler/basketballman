<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teams - Basketballman</title>
  <link rel="stylesheet" href="/static/app.css">
  <script type="module" src="/static/islands.js"></script>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">Basketballman</a>
    <div class="nav-section">
      <span class="nav-label">League</span>
      <a href="/standings">Standings</a>
      <a href="/teams">Teams</a>
      <a href="/schedule">Schedule</a>
      <a href="/playoffs">Playoffs</a>
      <a href="/trades">Trades</a>
      <a href="/me">My Team</a>
    </div>
  </nav>
  <main class="page">
    <section class="panel">
      <div class="section-head">
        <h1>Teams</h1>
        <input data-team-filter type="search" placeholder="Filter teams">
      </div>
      <div class="table-wrap">
        <table class="sortable" data-filter-table>
          <thead><tr><th>Team</th><th>Conference</th><th>Division</th><th>Roster</th><th>Rating</th></tr></thead>
          <tbody>
          {% for team in teams %}
            <tr>
              <td><a href="/teams/{{ team.id }}">{{ team.city }} {{ team.name }}</a></td>
              <td>{{ team.conference }}</td>
              <td>{{ team.division }}</td>
              <td>{{ team.roster }}</td>
              <td>{{ team.rating }}</td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
