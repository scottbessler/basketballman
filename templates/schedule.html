<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schedule - Basketballman</title>
  <link rel="stylesheet" href="/static/app.css">
  <script type="module" src="/static/islands.js"></script>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="/">Basketballman</a>
    <div class="nav-section">
      <span class="nav-label">League</span>
      <a href="/standings">Standings</a>
      <a href="/teams">Teams</a>
      <a href="/schedule">Schedule</a>
      <a href="/playoffs">Playoffs</a>
      <a href="/trades">Trades</a>
      <a href="/me">My Team</a>
    </div>
  </nav>
  <main class="page">
    <section class="panel">
      <div class="section-head">
        <h1>Schedule</h1>
        <input data-team-filter type="search" placeholder="Filter games">
      </div>
      <div class="table-wrap">
        <table class="sortable" data-filter-table>
          <thead><tr><th>Day</th><th>Away</th><th>Home</th><th>Status</th><th>Score</th><th></th></tr></thead>
          <tbody>
          {% for game in games %}
            <tr>
              <td>{{ game.date_index }}</td>
              <td><a href="/games/{{ game.id }}">{{ game.away }}</a></td>
              <td><a href="/games/{{ game.id }}">{{ game.home }}</a></td>
              <td>{{ game.status }}</td>
              <td>{{ game.score }}</td>
              <td>
                {% if game.played %}
                  <span class="pill">Final</span>
                {% else %}
                  <form method="post" action="/games/{{ game.id }}/simulate" data-sim-form>
                    <button type="submit">Sim</button>
                  </form>
                {% endif %}
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
